<!DOCTYPE html>
<html>
  <body>
    <link rel="stylesheet" href="/style.css" />
    <canvas
      id="world"
      style="width: 100vw; height: 100vh; display: block; position: absolute; z-index: 1"
    ></canvas>

    <button id="settings-toggle" class="settings-toggle">
      <img src="/cog.png" alt="Settings" class="settings-icon" />
    </button>

    <div id="controls-panel">
      <div class="controls-section">
        <div class="controls-section-title">Game Progress</div>
        <button id="saveGame" class="control-button">
          Save
        </button>
      </div>

      <div class="controls-section">
        <div class="controls-section-title">Import/Export</div>
        <button id="exportGame" class="control-button">
          Export
        </button>
        <button id="importGame" class="control-button">
          Import
        </button>
      </div>

      <div class="controls-section">
        <div class="controls-section-title">Danger Zone</div>
        <button id="resetGame" class="control-button danger">
          Reset
        </button>
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
